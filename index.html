<title>Operation Birthday Reset</title>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,system-ui,'Segoe UI',sans-serif;background:#080C14;color:#C8CDD8;min-height:100vh;min-height:100dvh;overflow-x:hidden;padding-top:env(safe-area-inset-top)}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.header{padding:20px 18px 14px;background:linear-gradient(180deg,rgba(15,25,45,0.9),transparent);border-bottom:1px solid rgba(255,255,255,0.06)}
.header-label{font-size:10px;color:#5B6B8A;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.header h1{font-size:20px;font-weight:700;color:#E8ECF2;letter-spacing:-0.5px}
.stats{display:flex;gap:16px;margin-top:10px;padding:10px 14px;background:rgba(91,155,247,0.06);border:1px solid rgba(91,155,247,0.12);border-radius:8px}
.stat{text-align:center;flex:1}
.stat-num{font-size:20px;font-weight:700;color:#5B9BF7;line-height:1}
.stat-num.green{color:#2ECC71}
.stat-num.orange{color:#E67E22}
.stat-label{font-size:9px;color:#5B6B8A;text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.nav{display:flex;border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:10;background:#080C14}
.nav button{flex:1;padding:12px 8px;border-bottom:2px solid transparent;color:#5B6B8A;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all 0.2s}
.nav button.active{background:rgba(255,255,255,0.03);border-bottom-color:#5B9BF7;color:#E8ECF2;font-weight:600}
.nav .icon{font-size:14px}
.content{padding:16px 16px 100px}
.section{display:none}
.section.active{display:block}
.phase-sel{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.phase-btn{padding:6px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:#8E9AAF;font-size:11px;font-weight:500;transition:all 0.2s}
.phase-btn.active{border-color:currentColor}
.day-sel{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.day-btn{padding:5px 12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:5px;color:#5B6B8A;font-size:11px;transition:all 0.2s}
.day-btn.active{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.15);color:#C8CDD8}
.reset-btn{margin-left:auto;padding:5px 10px;background:rgba(231,76,60,0.08);border:1px solid rgba(231,76,60,0.2);border-radius:5px;color:#E74C3C;font-size:10px}
.progress{padding:12px 14px;background:rgba(255,255,255,0.02);border-radius:8px;border:1px solid rgba(255,255,255,0.06);margin-bottom:16px}
.progress-top{display:flex;justify-content:space-between;font-size:11px;color:#5B6B8A;margin-bottom:6px}
.progress-val{color:#5B9BF7;font-weight:600}
.progress-val.done{color:#2ECC71}
.bar{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.3s;background:linear-gradient(90deg,#5B9BF7,#4A90D9)}
.bar-fill.done{background:linear-gradient(90deg,#2ECC71,#27AE60)}
.complete-msg{padding:12px 14px;background:rgba(46,204,113,0.08);border:1px solid rgba(46,204,113,0.2);border-radius:8px;margin-bottom:16px;font-size:13px;color:#8ED4A8;text-align:center}
.group-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#5B6B8A;margin:14px 0 6px;font-family:ui-monospace,monospace}
.check{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;background:rgba(255,255,255,0.02);border-radius:6px;margin-bottom:3px;user-select:none;transition:all 0.15s;cursor:pointer}
.check.on{background:rgba(46,204,113,0.04);opacity:0.55}
.check.on .check-text{text-decoration:line-through}
.checkbox{width:22px;height:22px;border-radius:5px;flex-shrink:0;border:2px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.check.on .checkbox{background:#2ECC71;border-color:#2ECC71}
.checkmark{display:none;color:#080C14;font-size:13px;font-weight:700}
.check.on .checkmark{display:block}
.check-text{font-size:13px;color:#C8CDD8;line-height:1.4}
.phase-card{margin-bottom:12px;border:1px solid rgba(255,255,255,0.06);border-radius:10px;overflow:hidden}
.phase-hdr{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.phase-num{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.phase-info{flex:1}
.phase-title{font-size:14px;font-weight:600;color:#E8ECF2}
.phase-dates{font-size:10px;color:#5B6B8A;margin-top:1px;font-family:ui-monospace,monospace}
.phase-toggle{color:#5B6B8A;font-size:16px;transition:transform 0.2s}
.phase-card.open .phase-toggle{transform:rotate(45deg)}
.phase-body{display:none;padding:0 16px 16px;border-top:1px solid rgba(255,255,255,0.04)}
.phase-card.open .phase-body{display:block}
.change{padding:10px 12px;margin-top:8px;background:rgba(255,255,255,0.02);border-radius:6px;border-left:3px solid #444}
.change-title{font-size:13px;font-weight:600;color:#E8ECF2;display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.tag{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;padding:2px 6px;border-radius:3px}
.tag-new{background:rgba(46,204,113,0.15);color:#2ECC71}
.tag-upgrade{background:rgba(91,155,247,0.15);color:#5B9BF7}
.change-desc{font-size:12px;color:#8E9AAF;line-height:1.5}
.blueprint{margin-top:16px;border:1px solid rgba(91,155,247,0.15);border-radius:8px;overflow:hidden}
.bp-title{padding:10px 14px;background:rgba(91,155,247,0.06);font-size:11px;font-weight:600;color:#5B9BF7;text-transform:uppercase;letter-spacing:1px}
.bp-row{display:flex;gap:10px;padding:9px 14px;border-top:1px solid rgba(255,255,255,0.03);align-items:flex-start}
.bp-time{font-size:11px;color:#5B9BF7;min-width:72px;flex-shrink:0;font-family:ui-monospace,monospace;padding-top:1px}
.bp-act{font-size:12px;font-weight:600;color:#C8CDD8}
.bp-detail{font-size:11px;color:#5B6B8A;margin-top:1px}
.meal-card{padding:12px 14px;margin-bottom:8px;background:rgba(255,255,255,0.02);border-radius:8px;border-left:3px solid rgba(46,204,113,0.3)}
.meal-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#2ECC71;margin-bottom:4px;font-family:ui-monospace,monospace}
.meal-text{font-size:13px;color:#C8CDD8;line-height:1.5}
.rule{padding:14px;margin-bottom:8px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px}
.rule-num{font-size:10px;color:#5B9BF7;font-family:ui-monospace,monospace;margin-bottom:4px}
.rule-title{font-size:14px;font-weight:600;color:#E8ECF2;margin-bottom:4px}
.rule-desc{font-size:12px;color:#8E9AAF;line-height:1.5}
.callout{margin-top:16px;padding:14px;border-radius:8px;font-size:12px;line-height:1.5}
.callout-blue{background:rgba(91,155,247,0.08);border:1px solid rgba(91,155,247,0.15);color:#8EAFD4}
.callout-blue strong{color:#A8C8F0}
.callout-red{background:rgba(231,76,60,0.06);border:1px solid rgba(231,76,60,0.15);color:#D4A5A0}

.callout-amber{background:rgba(245,195,80,0.08);border:1px solid rgba(245,195,80,0.15);color:#D4C4A0}
.callout-amber strong{color:#F0D8A0}
.emergency-title{font-size:13px;font-weight:600;color:#E8A9A1;margin-bottom:10px}
.emergency-item{font-size:12px;color:#D4A5A0;line-height:1.6;margin-bottom:6px;padding-left:16px;position:relative}
.emergency-item::before{content:'\2192';position:absolute;left:0;color:#E74C3C}
.history-header{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#5B6B8A;margin:0 0 10px;font-family:ui-monospace,monospace}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:20px}

.cal-label{color:#5B6B8A;font-size:9px}

.cal-none{background:rgba(255,255,255,0.04);color:#5B6B8A}
.cal-partial{background:rgba(91,155,247,0.15);color:#5B9BF7}
.cal-full{background:rgba(46,204,113,0.2);color:#2ECC71}
.cal-today{outline:2px solid #5B9BF7;outline-offset:-1px}
.streak-bar{display:flex;gap:12px;padding:12px 14px;background:rgba(255,255,255,0.02);border-radius:8px;border:1px solid rgba(255,255,255,0.06);margin-bottom:16px}
.streak-item{text-align:center;flex:1}
.streak-num{font-size:18px;font-weight:700;line-height:1}
.streak-label{font-size:9px;color:#5B6B8A;text-transform:uppercase;letter-spacing:1px;margin-top:3px}

</head>

  saturday:[
    {g:"Morning",i:["Apply minoxidil","Alarmy + Duolingo","Phone face-down after Duolingo","Fill water bottle #1 (water/coffee only \u2014 fasting)","Morning exercise (30 min)"]},
    {g:"Fasting",i:["18:6 window: 11 am \u2013 5 pm. No food outside."]},
    {g:"Daytime",i:["Meal 1 at 11:00 am","Free day \u2014 socialize, errands, recharge","Last meal by 5:00 pm, logged in MFP"]},
    {g:"Evening",i:["No food after 5 pm","8:30 shutdown: phone out of bedroom","Apply minoxidil","8:45\u20139:30 wind-down, no screens","Asleep by 9:30"]}
  ],
  sunday:[
    {g:"Morning",i:["Apply minoxidil","Alarmy + Duolingo","Phone face-down after Duolingo","Fill water bottle #1 (water/coffee only \u2014 fasting)","Morning exercise (30 min)"]},
    {g:"Fasting",i:["18:6 window: 11 am \u2013 5 pm. No food outside."]},
    {g:"Afternoon",i:["Meal 1 at 11:00 am","Content block (45\u201360 min)","Sunday prep: meal prep ALL meals for week","Sunday prep: plan power blocks in Todoist","Sunday prep: pack Monday lunch","Last meal by 5:00 pm, logged in MFP","Weekly review + weigh-in","Check Opal: screen time under 3h daily avg?"]},
    {g:"Evening",i:["Free time (earned)","8:30 shutdown: phone out of bedroom","Apply minoxidil","8:45\u20139:30 wind-down, no screens","Asleep by 9:30"]}
  ]
}
};

  {t:"Sunday Prep Session (60 min)",tag:"new",d:"Meal prep for the week, plan power blocks in Todoist, lay out Monday clothes."},
  {t:"Water: 32oz Bottle x2+/Day",tag:"new",d:"Fill at morning and midday. Water and black coffee only before 11am."},

let state={phase:"1",dayType:"commute",tab:"tracker",checked:{},expandedPhase:"1"};
function load(){try{const s=localStorage.getItem("reset-state-v3");if(s){Object.assign(state,JSON.parse(s))}else{const o=localStorage.getItem("reset-state-v2")||localStorage.getItem("reset-state");if(o)Object.assign(state,JSON.parse(o))}}catch(e){}}
function save(){try{localStorage.setItem("reset-state-v3",JSON.stringify(state))}catch(e){}}
function dateKey(d){d=d||new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function daysLeft(){return Math.max(0,Math.ceil((new Date("2026-05-18")-new Date())/(864e5)))}
function getItems(){return(CK[state.phase]?.[state.dayType]||[]).flatMap((g,gi)=>g.i.map((_,ii)=>gi+"-"+ii))}
function getPct(){const dk=dateKey(),dc=state.checked[dk]||{},items=getItems(),n=items.filter(id=>dc[state.phase+"-"+state.dayType+"-"+id]).length;return items.length?Math.round(n/items.length*100):0}
function getCC(){const dk=dateKey(),dc=state.checked[dk]||{};return getItems().filter(id=>dc[state.phase+"-"+state.dayType+"-"+id]).length}
function autoDay(){const d=new Date().getDay();if(d===0)return"sunday";if(d===6)return"saturday";if(d>=2&&d<=4)return"commute";return"wfh"}

function renderNav(){
  document.getElementById("nav").innerHTML=[{id:"tracker",l:"Daily",i:"\u2610"},{id:"plan",l:"Plan",i:"\u25a6"},{id:"meals",l:"Meals",i:"\u25c8"},{id:"rules",l:"Rules",i:"\u25c6"},{id:"history",l:"History",i:"\u25eb"}].map(t=>"<button class=\""+(state.tab===t.id?"active":"")+"\" onclick=\"switchTab('"+t.id+"')\"><span class=\"icon\">"+t.i+"</span>"+t.l+"</button>").join("")}

function switchTab(t){state.tab=t;save();renderNav();document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));document.getElementById("sec-"+t).classList.add("active");({tracker:renderTracker,plan:renderPlan,meals:renderMeals,rules:renderRules,history:renderHistory})[t]?.()}

function updateStats(){document.getElementById("s-days").textContent=daysLeft();document.getElementById("s-weeks").textContent=(daysLeft()/7).toFixed(1);document.getElementById("s-today").textContent=getPct()+"%"}

function renderTracker(){
  const dk=dateKey(),dc=state.checked[dk]||{},data=CK[state.phase]?.[state.dayType]||[],pct=getPct(),cc=getCC(),total=getItems().length;
  let h="<div class=\"phase-sel\">";
  phases.forEach(p=>{const a=state.phase===p.id;h+="<button class=\"phase-btn "+(a?"active":"")+"\" style=\""+(a?"background:"+p.color+"22;color:"+p.color+";border-color:"+p.color+"44":"")+"\" onclick=\"setPhase('"+p.id+"')\">P"+p.num+"</button>"});
  h+="</div><div class=\"day-sel\">";
  [{id:"commute",l:"Commute"},{id:"wfh",l:"WFH"},{id:"saturday",l:"Saturday"},{id:"sunday",l:"Sunday"}].forEach(d=>{h+="<button class=\"day-btn "+(state.dayType===d.id?"active":"")+"\" onclick=\"setDay('"+d.id+"')\">"+d.l+"</button>"});
  h+="<button class=\"reset-btn\" onclick=\"resetDay()\">Reset</button></div>";
  h+="<div class=\"progress\"><div class=\"progress-top\"><span>Today's progress</span><span class=\"progress-val "+(pct===100?"done":"")+"\">"+cc+"/"+total+" \xb7 "+pct+"%</span></div><div class=\"bar\"><div class=\"bar-fill "+(pct===100?"done":"")+"\" style=\"width:"+pct+"%\"></div></div></div>";
  if(pct===100)h+="<div class=\"complete-msg\">All done today. You showed up. That's the whole game.</div>";
  data.forEach((group,gi)=>{h+="<div class=\"group-label\">"+group.g+"</div>";group.i.forEach((item,ii)=>{const id=gi+"-"+ii,key=state.phase+"-"+state.dayType+"-"+id,on=dc[key]||false;h+="<div class=\"check "+(on?"on":"")+"\" onclick=\"toggleItem('"+id+"')\"><div class=\"checkbox\"><span class=\"checkmark\">\u2713</span></div><div class=\"check-text\">"+item+"</div></div>"})});
  document.getElementById("sec-tracker").innerHTML=h;updateStats()}

function setPhase(p){state.phase=p;save();renderTracker()}
function setDay(d){state.dayType=d;save();renderTracker()}
function toggleItem(id){const dk=dateKey();if(!state.checked[dk])state.checked[dk]={};const key=state.phase+"-"+state.dayType+"-"+id;state.checked[dk][key]=!state.checked[dk][key];save();renderTracker()}
function resetDay(){delete state.checked[dateKey()];save();renderTracker()}

function renderPlan(){
  let h="";
  phases.forEach(p=>{const open=state.expandedPhase===p.id;h+="<div class=\"phase-card "+(open?"open":"")+"\"><div class=\"phase-hdr\" onclick=\"togglePlanPhase('"+p.id+"')\"><div class=\"phase-num\" style=\"background:"+p.color+"22;color:"+p.color+"\">"+p.num+"</div><div class=\"phase-info\"><div class=\"phase-title\">"+p.title+"</div><div class=\"phase-dates\">"+p.dates+"</div></div><div class=\"phase-toggle\">+</div></div><div class=\"phase-body\">";(planDetails[p.id]||[]).forEach(ch=>{h+="<div class=\"change\" style=\"border-left-color:"+p.color+"\"><div class=\"change-title\">"+ch.t+" <span class=\"tag tag-"+ch.tag+"\">"+ch.tag+"</span></div><div class=\"change-desc\">"+ch.d+"</div></div>"});h+="</div></div>"});

  h+="<div class=\"blueprint\"><div class=\"bp-title\">Evening Blueprint (Commute Days)</div>";
  [["5:30\u20135:45","Transition","Change clothes. Fill water. 5 min outside. NO phone."],
  ["5:45\u20137:00","Power Block","Content / errands / prep. Decide before leaving work."],
  ["7:00\u20138:30","Free Time","TV, phone, Telegram. No food (window closed at 5pm). Guilt-free."],
  ["8:30\u20138:45","Shutdown","TV off. Phone out of bedroom. Apply minoxidil."],
  ["8:45\u20139:30","Wind-down","No screens. Stretch, read, or call fianc\xe9e. Asleep by 9:30."]].forEach(e=>{h+="<div class=\"bp-row\"><div class=\"bp-time\">"+e[0]+"</div><div><div class=\"bp-act\">"+e[1]+"</div><div class=\"bp-detail\">"+e[2]+"</div></div></div>"});
  h+="</div>";

  h+="<div class=\"blueprint\" style=\"margin-top:10px\"><div class=\"bp-title\">Morning Blueprint (Mon/Fri/Sat/Sun)</div>";
  [["Wake","Minoxidil","Apply right after getting up."],
  ["+5 min","Duolingo","3 lessons, then phone face-down."],
  ["+20 min","Exercise","30 min fasted \u2014 treadmill, bike, or gym."],
  ["+50 min","Shower","No food until 11am. Water and black coffee only."]].forEach(e=>{h+="<div class=\"bp-row\"><div class=\"bp-time\">"+e[0]+"</div><div><div class=\"bp-act\">"+e[1]+"</div><div class=\"bp-detail\">"+e[2]+"</div></div></div>"});
  h+="</div>";

  document.getElementById("sec-plan").innerHTML=h}

function togglePlanPhase(id){state.expandedPhase=state.expandedPhase===id?null:id;save();renderPlan()}

function renderMeals(){
  let h="<div class=\"callout callout-amber\" style=\"margin-top:0;margin-bottom:16px\"><strong>18:6 Fasting \u2014 Eating Window: 11:00 am \u2013 5:00 pm</strong><br>No food before 11am or after 5pm. Water, black coffee, and plain tea are fine anytime. All meals tracked in MFP.</div>";
  h+="<div style=\"font-size:12px;color:#5B6B8A;margin-bottom:14px;line-height:1.5\">1,950 cal/day \u2014 all within your 6-hour window.</div>";
  [{l:"Meal 1 \u2014 11:00 am (~650 cal)",t:"Largest meal. Protein + carb + veggie. Break the fast with real food. E.g. chicken + rice + veggies, turkey stir-fry, salmon + sweet potato."},
  {l:"Meal 2 \u2014 2:00\u20133:00 pm (~650 cal)",t:"Same template, different protein/seasoning. Prepped Sunday. Pack the night before for commute days."},
  {l:"Meal 3 \u2014 4:30\u20135:00 pm (~500 cal)",t:"Last meal before window closes. Lighter but still substantial. Wrap up eating by 5:00 sharp."},
  {l:"Snack (within window, ~150 cal)",t:"Greek yogurt, fruit, protein bar, nuts. Only if hungry. Pre-portioned. Ask: hungry or avoiding?"}].forEach(m=>{h+="<div class=\"meal-card\"><div class=\"meal-label\">"+m.l+"</div><div class=\"meal-text\">"+m.t+"</div></div>"});
  h+="<div class=\"callout callout-blue\"><strong>Calorie math:</strong> Meal 1 ~650 + Meal 2 ~650 + Meal 3 ~500 + Snack ~150 = 1,950 cal. All within 11am\u20135pm.</div>";
  h+="<div class=\"callout callout-red\" style=\"margin-top:10px\"><strong>Morning rule:</strong> Nothing but water, black coffee, or plain tea before 11am. Your morning exercise is fasted \u2014 this is fine and may actually boost fat burning.</div>";
  document.getElementById("sec-meals").innerHTML=h}

function renderRules(){
  let h="";
  [{n:"01",t:"Never Break Two Days in a Row",d:"Miss one = human. Miss two = pattern. Next day, back on."},
  {n:"02",t:"Decide Before, Not During",d:"Sunday you plan. Weekdays you execute."},
  {n:"03",t:"The Transition Is Sacred",d:"15 min after work: change, water, outside. The most important habit."},
  {n:"04",t:"Earned > Guilty Free Time",d:"TV after power block = good. TV instead of = shame."},
  {n:"05",t:"Small > Zero",d:"10 min walk > nothing. 20 min content > none. Shrink, don't skip."},
  {n:"06",t:"Systems Are Your Superpower",d:"YNAB, Alarmy, Opal, PhD. When you build systems, you execute."}].forEach(r=>{h+="<div class=\"rule\"><div class=\"rule-num\">RULE "+r.n+"</div><div class=\"rule-title\">"+r.t+"</div><div class=\"rule-desc\">"+r.d+"</div></div>"});
  h+="<div class=\"callout callout-red\" style=\"margin-top:16px\"><div class=\"emergency-title\">Emergency Protocol</div>";
  ["Want to skip everything? Just do the transition ritual. Change clothes + 2 min outside.",
  "Terrible day? Shrink everything. 10 min walk. 15 min content. Small > zero.",
  "Broke the chain 2+ days? No spiral. Read Rule 01. Start TONIGHT.",
  "Iran news overwhelming? 15 min on X, then close. Call family. Channel it into content."].forEach(e=>{h+="<div class=\"emergency-item\">"+e+"</div>"});
  h+="</div>";document.getElementById("sec-rules").innerHTML=h}

function renderHistory(){
  let h="",streak=0;const today=new Date();
  for(let i=0;i<60;i++){const d=new Date(today);d.setDate(d.getDate()-i);const dc=state.checked[dateKey(d)];if(dc&&Object.values(dc).some(v=>v))streak++;else if(i>0)break}
  let cd=0;Object.keys(state.checked).forEach(dk=>{const dc=state.checked[dk];if(dc&&Object.values(dc).some(v=>v))cd++});
  h+="<div class=\"streak-bar\"><div class=\"streak-item\"><div class=\"streak-num\" style=\"color:#E67E22\">"+streak+"</div><div class=\"streak-label\">Current Streak</div></div><div class=\"streak-item\"><div class=\"streak-num\" style=\"color:#5B9BF7\">"+cd+"</div><div class=\"streak-label\">Active Days</div></div><div class=\"streak-item\"><div class=\"streak-num\" style=\"color:#2ECC71\">"+daysLeft()+"</div><div class=\"streak-label\">Days Left</div></div></div>";
  h+="<div class=\"history-header\">This Month</div>";
  const now=new Date(),year=now.getFullYear(),month=now.getMonth(),fd=new Date(year,month,1).getDay(),dim=new Date(year,month+1,0).getDate();
  h+="<div class=\"cal-grid\">";["S","M","T","W","T","F","S"].forEach(d=>{h+="<div class=\"cal-label\">"+d+"</div>"});
  for(let i=0;i<fd;i++)h+="<div class=\"cal-empty\"></div>";
  for(let d=1;d<=dim;d++){const dt=new Date(year,month,d),dk=dateKey(dt),dc=state.checked[dk],isT=dk===dateKey(),isF=dt>now&&!isT;let cls="cal-none";if(isF)cls="cal-future";else if(dc){const v=Object.values(dc),c=v.filter(x=>x).length;if(c>0&&c>=v.length*0.8)cls="cal-full";else if(c>0)cls="cal-partial"}h+="<div class=\""+cls+" cal-day "+(isT?"cal-today":"")+"\">"+d+"</div>"}
  h+="</div><div style=\"display:flex;gap:12px;flex-wrap:wrap;font-size:10px;color:#5B6B8A\">";
  h+="<span style=\"display:flex;align-items:center;gap:4px\"><span style=\"width:10px;height:10px;border-radius:2px;background:rgba(46,204,113,0.2)\"></span>80%+</span>";
  h+="<span style=\"display:flex;align-items:center;gap:4px\"><span style=\"width:10px;height:10px;border-radius:2px;background:rgba(91,155,247,0.15)\"></span>Partial</span>";
  h+="<span style=\"display:flex;align-items:center;gap:4px\"><span style=\"width:10px;height:10px;border-radius:2px;background:rgba(255,255,255,0.04)\"></span>No data</span></div>";
  document.getElementById("sec-history").innerHTML=h}

load();if(!state.checked)state.checked={};state.dayType=autoDay();state.tab=state.tab||"tracker";renderNav();switchTab(state.tab);
if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
